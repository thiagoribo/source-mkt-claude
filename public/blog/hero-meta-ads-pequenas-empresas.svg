<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;family=DM+Mono:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#212E3F"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="1" fill="#DCB464"/>
  <text x="60" y="58" font-family="'DM Mono', monospace" font-size="10" fill="#DCB464" letter-spacing="5" opacity="0.7">SOURCE BLOG · ESTRATÉGIA</text>

  <!-- Funnel visualization — right side -->
  <!-- Funnel top (awareness) -->
  <polygon points="620,160 1060,160 980,250 700,250" fill="#DCB464" opacity="0.7"/>
  <text x="840" y="215" font-family="'DM Mono', monospace" font-size="10" fill="#212E3F" text-anchor="middle" letter-spacing="3" font-weight="400">ALCANCE · 140M</text>

  <!-- Funnel mid (consideration) -->
  <polygon points="700,262 980,262 920,352 760,352" fill="#DCB464" opacity="0.5"/>
  <text x="840" y="312" font-family="'DM Mono', monospace" font-size="10" fill="#212E3F" text-anchor="middle" letter-spacing="3" font-weight="400">LEADS · CPL R$ 16</text>

  <!-- Funnel bottom (conversion) -->
  <polygon points="760,364 920,364 875,454 805,454" fill="#DCB464" opacity="0.85"/>
  <text x="840" y="414" font-family="'DM Mono', monospace" font-size="10" fill="#212E3F" text-anchor="middle" letter-spacing="3" font-weight="400">VENDAS · ROAS 4×</text>

  <!-- Gap lines between funnel sections -->
  <rect x="620" y="250" width="440" height="12" fill="#212E3F"/>
  <rect x="700" y="352" width="280" height="12" fill="#212E3F"/>

  <!-- Arrow below funnel -->
  <line x1="840" y1="466" x2="840" y2="496" stroke="#DCB464" stroke-width="2" opacity="0.6"/>
  <polygon points="834,490 846,490 840,504" fill="#DCB464" opacity="0.6"/>

  <!-- Budget label -->
  <rect x="770" y="510" width="140" height="30" fill="#DCB464" opacity="0.12"/>
  <rect x="770" y="510" width="140" height="30" fill="none" stroke="#DCB464" stroke-width="1" opacity="0.5"/>
  <text x="840" y="530" font-family="'DM Mono', monospace" font-size="11" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.9">R$ 1.500/MÊS</text>

  <!-- Title text -->
  <text x="60" y="108" font-family="'Montserrat', sans-serif" font-size="38" font-weight="900" fill="#F2F0EB" letter-spacing="-1">META ADS PARA</text>
  <text x="60" y="152" font-family="'Montserrat', sans-serif" font-size="38" font-weight="900" fill="#DCB464" letter-spacing="-1">PEQUENAS EMPRESAS</text>
  <rect x="60" y="162" width="380" height="3" fill="#DCB464"/>
  <text x="60" y="186" font-family="'DM Mono', monospace" font-size="12" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Quanto investir e como escalar em 2026</text>

  <!-- Investment tiers -->
  <rect x="60" y="330" width="460" height="1" fill="#DCB464" opacity="0.15"/>
  <text x="60" y="355" font-family="'DM Mono', monospace" font-size="11" fill="#F2F0EB" opacity="0.5" letter-spacing="1">AWARENESS    →   a partir de R$ 600/mês</text>
  <text x="60" y="378" font-family="'DM Mono', monospace" font-size="11" fill="#F2F0EB" opacity="0.5" letter-spacing="1">LEADS        →   a partir de R$ 1.500/mês</text>
  <text x="60" y="401" font-family="'DM Mono', monospace" font-size="11" fill="#DCB464" opacity="0.8" letter-spacing="1">CONVERSÃO    →   a partir de R$ 2.500/mês</text>
  <rect x="60" y="414" width="460" height="1" fill="#DCB464" opacity="0.15"/>

  <!-- Escalation label -->
  <text x="60" y="445" font-family="'DM Mono', monospace" font-size="9" fill="#F2F0EB" opacity="0.35" letter-spacing="3">ESCALA VERTICAL · ESCALA HORIZONTAL</text>

  <!-- Bottom author -->
  <circle cx="72" cy="598" r="14" fill="#DCB464" opacity="0.2"/>
  <text x="96" y="602" font-family="'DM Mono', monospace" font-size="11" fill="#F2F0EB" opacity="0.6" letter-spacing="1">Thiago Castro · Performance &amp; Crescimento</text>

  <!-- Bottom line -->
  <rect x="0" y="629" width="1200" height="1" fill="#DCB464" opacity="0.4"/>
</svg>
