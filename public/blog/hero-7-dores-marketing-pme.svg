<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#212E3F"/>

  <!-- Large horizontal rule — editorial brutalist signature element -->
  <rect x="0" y="295" width="1200" height="5" fill="#DCB464" opacity="0.18"/>

  <!-- RIGHT side: Numbered list, editorial style -->
  <!-- Large counter numbers in background -->
  <text x="640" y="580" font-family="'Montserrat', sans-serif" font-size="420" font-weight="900" fill="#DCB464" opacity="0.03" letter-spacing="-40">07</text>

  <!-- Vertical numbered list of the 7 dores (right column) -->
  <g transform="translate(640, 70)">
    <!-- Line markers -->
    <rect x="0" y="0" width="480" height="1" fill="#DCB464" opacity="0.25"/>

    <!-- Dore 1 -->
    <text x="0"  y="42"  font-family="monospace" font-size="9" fill="#DCB464" opacity="0.7" letter-spacing="2">01</text>
    <rect x="28" y="34" width="420" height="1" fill="#F2F0EB" opacity="0.08"/>
    <text x="36" y="42"  font-family="monospace" font-size="10" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Tráfego pago sem estratégia de funil</text>

    <!-- Dore 2 -->
    <text x="0"  y="82"  font-family="monospace" font-size="9" fill="#DCB464" opacity="0.7" letter-spacing="2">02</text>
    <rect x="28" y="74" width="420" height="1" fill="#F2F0EB" opacity="0.08"/>
    <text x="36" y="82"  font-family="monospace" font-size="10" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Branding inconsistente</text>

    <!-- Dore 3 -->
    <text x="0"  y="122" font-family="monospace" font-size="9" fill="#DCB464" opacity="0.7" letter-spacing="2">03</text>
    <rect x="28" y="114" width="420" height="1" fill="#F2F0EB" opacity="0.08"/>
    <text x="36" y="122" font-family="monospace" font-size="10" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Conteúdo sem posicionamento</text>

    <!-- Dore 4 -->
    <text x="0"  y="162" font-family="monospace" font-size="9" fill="#DCB464" opacity="0.7" letter-spacing="2">04</text>
    <rect x="28" y="154" width="420" height="1" fill="#F2F0EB" opacity="0.08"/>
    <text x="36" y="162" font-family="monospace" font-size="10" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Leads que chegam mas não convertem</text>

    <!-- Dore 5 — highlighted -->
    <rect x="0"  y="175" width="480" height="36" fill="#DCB464" opacity="0.1"/>
    <text x="0"  y="202" font-family="monospace" font-size="9" fill="#DCB464" opacity="0.9" letter-spacing="2">05</text>
    <text x="36" y="202" font-family="monospace" font-size="10" fill="#DCB464" opacity="0.9" letter-spacing="1">Marketing e vendas desalinhados</text>

    <!-- Dore 6 -->
    <text x="0"  y="242" font-family="monospace" font-size="9" fill="#DCB464" opacity="0.7" letter-spacing="2">06</text>
    <rect x="28" y="234" width="420" height="1" fill="#F2F0EB" opacity="0.08"/>
    <text x="36" y="242" font-family="monospace" font-size="10" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Métricas de vaidade, não de resultado</text>

    <!-- Dore 7 -->
    <text x="0"  y="282" font-family="monospace" font-size="9" fill="#DCB464" opacity="0.7" letter-spacing="2">07</text>
    <rect x="28" y="274" width="420" height="1" fill="#F2F0EB" opacity="0.08"/>
    <text x="36" y="282" font-family="monospace" font-size="10" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Troca de estratégia sem aprendizado</text>

    <!-- Bottom rule -->
    <rect x="0" y="300" width="480" height="1" fill="#DCB464" opacity="0.25"/>

    <!-- Stat at bottom -->
    <text x="0"  y="335" font-family="monospace" font-size="9" fill="#DCB464" opacity="0.5" letter-spacing="2">71% DAS EMPRESAS NÃO BATERAM METAS EM 2024</text>
    <text x="0"  y="353" font-family="monospace" font-size="9" fill="#F2F0EB" opacity="0.3" letter-spacing="1">Fonte: RD Station / Mundo do Marketing</text>
  </g>

  <!-- LEFT side: Dominant typographic editorial treatment -->
  <rect x="0" y="0" width="1200" height="1" fill="#DCB464"/>
  <text x="60" y="58" font-family="monospace" font-size="10" fill="#DCB464" letter-spacing="5" opacity="0.7">SOURCE BLOG · ESTRATÉGIA</text>

  <!-- Giant "07" number — editorial anchor -->
  <text x="60" y="340" font-family="'Montserrat', sans-serif" font-size="230" font-weight="900" fill="#DCB464" opacity="0.12">07</text>

  <!-- Main title over the number -->
  <text x="60" y="148" font-family="'Montserrat', sans-serif" font-size="44" font-weight="900" fill="#F2F0EB" letter-spacing="-1">AS 7 DORES</text>
  <rect x="60" y="158" width="370" height="4" fill="#DCB464"/>
  <text x="60" y="202" font-family="'Montserrat', sans-serif" font-size="28" font-weight="700" fill="#DCB464" letter-spacing="0">DE MARKETING</text>
  <text x="60" y="242" font-family="'Montserrat', sans-serif" font-size="28" font-weight="700" fill="#F2F0EB" opacity="0.8" letter-spacing="0">QUE IMPEDEM</text>
  <text x="60" y="280" font-family="'Montserrat', sans-serif" font-size="28" font-weight="700" fill="#F2F0EB" opacity="0.8" letter-spacing="0">O CRESCIMENTO</text>
  <text x="60" y="318" font-family="'Montserrat', sans-serif" font-size="28" font-weight="700" fill="#DCB464" letter-spacing="0">DA SUA PME</text>

  <!-- Vertical rule between halves -->
  <rect x="616" y="60" width="1" height="510" fill="#DCB464" opacity="0.2"/>

  <!-- Bottom author -->
  <rect x="0" y="580" width="1200" height="1" fill="#DCB464" opacity="0.3"/>
  <circle cx="72" cy="598" r="14" fill="#DCB464" opacity="0.2"/>
  <text x="96" y="602" font-family="monospace" font-size="11" fill="#F2F0EB" opacity="0.6" letter-spacing="1">Thiago Castro · Performance &amp; Crescimento</text>
  <rect x="0" y="629" width="1200" height="1" fill="#DCB464" opacity="0.4"/>
</svg>