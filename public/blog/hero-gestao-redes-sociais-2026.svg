<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#212E3F"/>

  <!-- Right side: Feed grid pattern (reference to social media grids) -->
  <!-- 3x3 grid of squares, top right, representing Instagram/TikTok feed -->
  <g transform="translate(560, 60)" opacity="1">
    <!-- Row 1 -->
    <rect x="0"   y="0"   width="152" height="152" fill="#DCB464" opacity="0.15" rx="0"/>
    <rect x="164" y="0"   width="152" height="152" fill="#DCB464" opacity="0.08" rx="0"/>
    <rect x="328" y="0"   width="152" height="152" fill="#DCB464" opacity="0.22" rx="0"/>
    <!-- Row 2 -->
    <rect x="0"   y="164" width="152" height="152" fill="#DCB464" opacity="0.1"  rx="0"/>
    <rect x="164" y="164" width="152" height="152" fill="#DCB464" opacity="0.25" rx="0"/>
    <rect x="328" y="164" width="152" height="152" fill="#DCB464" opacity="0.12" rx="0"/>
    <!-- Row 3 -->
    <rect x="0"   y="328" width="152" height="152" fill="#DCB464" opacity="0.18" rx="0"/>
    <rect x="164" y="328" width="152" height="152" fill="#DCB464" opacity="0.06" rx="0"/>
    <rect x="328" y="328" width="152" height="152" fill="#DCB464" opacity="0.2"  rx="0"/>

    <!-- Gold borders on some cells -->
    <rect x="0"   y="0"   width="152" height="152" fill="none" stroke="#DCB464" stroke-width="1.5" opacity="0.5" rx="0"/>
    <rect x="164" y="164" width="152" height="152" fill="none" stroke="#DCB464" stroke-width="2"   opacity="0.8" rx="0"/>
    <rect x="328" y="0"   width="152" height="152" fill="none" stroke="#DCB464" stroke-width="1"   opacity="0.4" rx="0"/>
    <rect x="0"   y="328" width="152" height="152" fill="none" stroke="#DCB464" stroke-width="1.5" opacity="0.5" rx="0"/>
    <rect x="328" y="328" width="152" height="152" fill="none" stroke="#DCB464" stroke-width="1"   opacity="0.45" rx="0"/>

    <!-- Highlighted center cell (most prominent) -->
    <text x="240" y="258" font-family="monospace" font-size="11" fill="#DCB464" text-anchor="middle" letter-spacing="3" opacity="0.9">PME</text>

    <!-- Cell icons / small elements -->
    <!-- Heart in top-left cell -->
    <text x="76"  y="84"  font-family="serif" font-size="28" fill="#DCB464" text-anchor="middle" opacity="0.4">♥</text>
    <!-- View eye in top-right -->
    <text x="404" y="84"  font-family="serif" font-size="24" fill="#DCB464" text-anchor="middle" opacity="0.35">◎</text>
    <!-- Share in bottom-left -->
    <text x="76"  y="412" font-family="serif" font-size="24" fill="#DCB464" text-anchor="middle" opacity="0.4">↗</text>
    <!-- Comment in bottom-right -->
    <text x="404" y="412" font-family="serif" font-size="22" fill="#DCB464" text-anchor="middle" opacity="0.35">□</text>

    <!-- Metric numbers small -->
    <text x="76"  y="140" font-family="monospace" font-size="9" fill="#F2F0EB" text-anchor="middle" opacity="0.3">89%</text>
    <text x="240" y="140" font-family="monospace" font-size="9" fill="#F2F0EB" text-anchor="middle" opacity="0.3">150M</text>
    <text x="404" y="140" font-family="monospace" font-size="9" fill="#F2F0EB" text-anchor="middle" opacity="0.3">3h32m</text>
  </g>

  <!-- Vertical separator line -->
  <rect x="544" y="60" width="2" height="510" fill="#DCB464" opacity="0.15"/>

  <!-- LEFT SIDE: Typography block -->
  <rect x="0" y="0" width="1200" height="1" fill="#DCB464"/>
  <text x="60" y="58" font-family="monospace" font-size="10" fill="#DCB464" letter-spacing="5" opacity="0.7">SOURCE BLOG · MARKETING</text>

  <!-- Main Title -->
  <text x="60" y="130" font-family="'Montserrat', sans-serif" font-size="40" font-weight="900" fill="#F2F0EB" letter-spacing="-1">GESTÃO DE</text>
  <text x="60" y="178" font-family="'Montserrat', sans-serif" font-size="40" font-weight="900" fill="#DCB464" letter-spacing="-1">REDES SOCIAIS</text>
  <text x="60" y="224" font-family="'Montserrat', sans-serif" font-size="40" font-weight="900" fill="#F2F0EB" letter-spacing="-1">PARA PMEs</text>
  <rect x="60" y="234" width="400" height="3" fill="#DCB464"/>

  <!-- Year badge -->
  <rect x="60" y="254" width="86" height="34" fill="#DCB464" opacity="0.15"/>
  <rect x="60" y="254" width="86" height="34" fill="none" stroke="#DCB464" stroke-width="1.5" opacity="0.7"/>
  <text x="103" y="276" font-family="'Montserrat', sans-serif" font-size="16" font-weight="900" fill="#DCB464" text-anchor="middle" letter-spacing="1">2026</text>
  <text x="157" y="276" font-family="monospace" font-size="11" fill="#F2F0EB" opacity="0.5" letter-spacing="1">Guia Completo</text>

  <!-- Key stats column -->
  <rect x="60" y="310" width="420" height="1" fill="#DCB464" opacity="0.2"/>

  <text x="60" y="335" font-family="monospace" font-size="9" fill="#DCB464" opacity="0.7" letter-spacing="2">DADOS · 2025–2026</text>

  <!-- Stat 1 -->
  <text x="60"  y="365" font-family="'Montserrat', sans-serif" font-size="26" font-weight="900" fill="#DCB464">89%</text>
  <text x="100" y="365" font-family="monospace" font-size="9" fill="#F2F0EB" opacity="0.5" letter-spacing="1">  pedidos via Instagram</text>

  <!-- Stat 2 -->
  <text x="60"  y="395" font-family="'Montserrat', sans-serif" font-size="26" font-weight="900" fill="#DCB464">150M</text>
  <text x="116" y="395" font-family="monospace" font-size="9" fill="#F2F0EB" opacity="0.5" letter-spacing="1">  brasileiros em redes sociais</text>

  <!-- Stat 3 -->
  <text x="60"  y="425" font-family="'Montserrat', sans-serif" font-size="26" font-weight="900" fill="#DCB464">74%</text>
  <text x="100" y="425" font-family="monospace" font-size="9" fill="#F2F0EB" opacity="0.5" letter-spacing="1">  decidem compras via social</text>

  <!-- Platform list -->
  <rect x="60" y="450" width="420" height="1" fill="#DCB464" opacity="0.15"/>
  <text x="60" y="472" font-family="monospace" font-size="9" fill="#F2F0EB" opacity="0.35" letter-spacing="2">INSTAGRAM · TIKTOK · LINKEDIN · WHATSAPP</text>

  <!-- Bottom author -->
  <rect x="0" y="580" width="1200" height="1" fill="#DCB464" opacity="0.3"/>
  <circle cx="72" cy="598" r="14" fill="#DCB464" opacity="0.2"/>
  <text x="96" y="602" font-family="monospace" font-size="11" fill="#F2F0EB" opacity="0.6" letter-spacing="1">Ana Santos · Estrategista de Posicionamento &amp; Marca</text>
  <rect x="0" y="629" width="1200" height="1" fill="#DCB464" opacity="0.4"/>
</svg>