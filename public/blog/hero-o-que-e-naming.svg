<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;family=DM+Mono:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#212E3F"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="1" fill="#DCB464"/>
  <text x="60" y="58" font-family="'DM Mono', monospace" font-size="10" fill="#DCB464" letter-spacing="5" opacity="0.7">SOURCE BLOG · BRANDING</text>

  <!-- Large typographic N symbol -->
  <text x="820" y="480" font-family="'Montserrat', sans-serif" font-size="480" font-weight="900" fill="#DCB464" opacity="0.04" text-anchor="middle">N</text>

  <!-- Letter construction lines — naming process visualization -->
  <!-- Left vertical stroke -->
  <rect x="620" y="180" width="6" height="260" fill="#DCB464" opacity="0.8"/>
  <!-- Diagonal stroke -->
  <line x1="626" y1="180" x2="826" y2="440" stroke="#DCB464" stroke-width="6" opacity="0.8"/>
  <!-- Right vertical stroke -->
  <rect x="820" y="180" width="6" height="260" fill="#DCB464" opacity="0.8"/>

  <!-- Construction guide dots -->
  <circle cx="620" cy="180" r="5" fill="#DCB464" opacity="0.5"/>
  <circle cx="826" cy="440" r="5" fill="#DCB464" opacity="0.5"/>
  <circle cx="820" cy="180" r="5" fill="#DCB464" opacity="0.5"/>
  <circle cx="620" cy="440" r="5" fill="#DCB464" opacity="0.5"/>

  <!-- Grid lines behind — blueprint feel -->
  <line x1="560" y1="180" x2="900" y2="180" stroke="#DCB464" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,8"/>
  <line x1="560" y1="310" x2="900" y2="310" stroke="#DCB464" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,8"/>
  <line x1="560" y1="440" x2="900" y2="440" stroke="#DCB464" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,8"/>
  <line x1="560" y1="140" x2="560" y2="480" stroke="#DCB464" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,8"/>
  <line x1="730" y1="140" x2="730" y2="480" stroke="#DCB464" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,8"/>
  <line x1="900" y1="140" x2="900" y2="480" stroke="#DCB464" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,8"/>

  <!-- Label below the letter -->
  <text x="723" y="510" font-family="'DM Mono', monospace" font-size="10" fill="#DCB464" text-anchor="middle" letter-spacing="5" opacity="0.6">NAMING</text>

  <!-- Title text -->
  <text x="60" y="108" font-family="'Montserrat', sans-serif" font-size="42" font-weight="900" fill="#F2F0EB" letter-spacing="-1">O QUE É</text>
  <text x="60" y="155" font-family="'Montserrat', sans-serif" font-size="42" font-weight="900" fill="#DCB464" letter-spacing="-1">NAMING</text>
  <rect x="60" y="165" width="220" height="3" fill="#DCB464"/>
  <text x="60" y="189" font-family="'DM Mono', monospace" font-size="12" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Por que o nome certo é seu ativo mais durável</text>

  <!-- Tags / process labels -->
  <rect x="60" y="420" width="100" height="22" fill="none" stroke="#DCB464" stroke-width="1" opacity="0.5"/>
  <text x="110" y="435" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.7">BRIEFING</text>

  <rect x="174" y="420" width="100" height="22" fill="none" stroke="#DCB464" stroke-width="1" opacity="0.5"/>
  <text x="224" y="435" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.7">GERAÇÃO</text>

  <rect x="288" y="420" width="100" height="22" fill="none" stroke="#DCB464" stroke-width="1" opacity="0.5"/>
  <text x="338" y="435" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.7">TRIAGEM</text>

  <rect x="402" y="420" width="100" height="22" fill="#DCB464" opacity="0.15"/>
  <text x="452" y="435" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.9">REGISTRO</text>

  <!-- Arrow connecting tags -->
  <line x1="160" y1="431" x2="174" y2="431" stroke="#DCB464" stroke-width="1" opacity="0.4"/>
  <line x1="274" y1="431" x2="288" y2="431" stroke="#DCB464" stroke-width="1" opacity="0.4"/>
  <line x1="388" y1="431" x2="402" y2="431" stroke="#DCB464" stroke-width="1" opacity="0.4"/>

  <!-- Bottom author -->
  <circle cx="72" cy="598" r="14" fill="#DCB464" opacity="0.2"/>
  <text x="96" y="602" font-family="'DM Mono', monospace" font-size="11" fill="#F2F0EB" opacity="0.6" letter-spacing="1">Ana Santos · Estrategista de Marca</text>

  <!-- Bottom line -->
  <rect x="0" y="629" width="1200" height="1" fill="#DCB464" opacity="0.4"/>
</svg>
