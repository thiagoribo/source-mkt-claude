<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&amp;family=DM+Mono:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#212E3F"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="1" fill="#DCB464"/>
  <text x="60" y="58" font-family="'DM Mono', monospace" font-size="10" fill="#DCB464" letter-spacing="5" opacity="0.7">SOURCE BLOG · MARKETING</text>

  <!-- Instagram-inspired grid pattern — right side -->
  <!-- 3x3 grid of rounded squares (feed posts) -->
  <!-- Row 1 -->
  <rect x="620" y="160" width="140" height="140" fill="#DCB464" opacity="0.55" rx="8"/>
  <rect x="772" y="160" width="140" height="140" fill="none" stroke="#DCB464" stroke-width="2" opacity="0.35" rx="8"/>
  <rect x="924" y="160" width="140" height="140" fill="#DCB464" opacity="0.2" rx="8"/>

  <!-- Row 2 -->
  <rect x="620" y="312" width="140" height="140" fill="none" stroke="#DCB464" stroke-width="2" opacity="0.25" rx="8"/>
  <rect x="772" y="312" width="140" height="140" fill="#DCB464" opacity="0.75" rx="8"/>
  <rect x="924" y="312" width="140" height="140" fill="none" stroke="#DCB464" stroke-width="2" opacity="0.4" rx="8"/>

  <!-- Row 3 -->
  <rect x="620" y="464" width="140" height="60" fill="#DCB464" opacity="0.15" rx="8"/>
  <rect x="772" y="464" width="140" height="60" fill="none" stroke="#DCB464" stroke-width="2" opacity="0.2" rx="8"/>
  <rect x="924" y="464" width="140" height="60" fill="#DCB464" opacity="0.35" rx="8"/>

  <!-- Gap lines between grid items -->
  <rect x="612" y="160" width="8" height="364" fill="#212E3F"/>
  <rect x="764" y="160" width="8" height="364" fill="#212E3F"/>
  <rect x="916" y="160" width="8" height="364" fill="#212E3F"/>
  <rect x="620" y="152" width="444" height="8" fill="#212E3F"/>
  <rect x="620" y="304" width="444" height="8" fill="#212E3F"/>
  <rect x="620" y="456" width="444" height="8" fill="#212E3F"/>

  <!-- Play icon on middle center tile -->
  <polygon points="822,382 822,342 862,362" fill="#212E3F" opacity="0.8"/>

  <!-- Instagram icon suggestion — camera outline top right tile -->
  <rect x="950" y="185" width="90" height="90" fill="none" stroke="#212E3F" stroke-width="0" opacity="0"/>
  <rect x="960" y="196" width="68" height="68" fill="none" stroke="#212E3F" stroke-width="2.5" rx="16" opacity="0.6"/>
  <circle cx="994" cy="230" r="18" fill="none" stroke="#212E3F" stroke-width="2.5" opacity="0.6"/>
  <circle cx="1017" cy="208" r="5" fill="#212E3F" opacity="0.6"/>

  <!-- 2026 label -->
  <text x="870" y="555" font-family="'DM Mono', monospace" font-size="11" fill="#DCB464" text-anchor="middle" letter-spacing="5" opacity="0.6">2026</text>

  <!-- Title text -->
  <text x="60" y="108" font-family="'Montserrat', sans-serif" font-size="38" font-weight="900" fill="#F2F0EB" letter-spacing="-1">INSTAGRAM</text>
  <text x="60" y="152" font-family="'Montserrat', sans-serif" font-size="38" font-weight="900" fill="#DCB464" letter-spacing="-1">PARA EMPRESAS</text>
  <rect x="60" y="162" width="300" height="3" fill="#DCB464"/>
  <text x="60" y="186" font-family="'DM Mono', monospace" font-size="12" fill="#F2F0EB" opacity="0.55" letter-spacing="1">Algoritmo, formatos e o que realmente converte</text>

  <!-- Format chips -->
  <rect x="60" y="340" width="70" height="24" fill="#DCB464" opacity="0.15"/>
  <rect x="60" y="340" width="70" height="24" fill="none" stroke="#DCB464" stroke-width="1" opacity="0.5"/>
  <text x="95" y="356" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.9">REELS</text>

  <rect x="140" y="340" width="84" height="24" fill="none" stroke="#DCB464" stroke-width="1" opacity="0.4"/>
  <text x="182" y="356" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.7">CARROSSEL</text>

  <rect x="234" y="340" width="70" height="24" fill="none" stroke="#DCB464" stroke-width="1" opacity="0.4"/>
  <text x="269" y="356" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" text-anchor="middle" letter-spacing="2" opacity="0.7">STORIES</text>

  <!-- Metrics row -->
  <rect x="60" y="385" width="460" height="1" fill="#DCB464" opacity="0.15"/>

  <text x="60" y="420" font-family="'DM Mono', monospace" font-size="9" fill="#F2F0EB" opacity="0.4" letter-spacing="3">146M USUÁRIOS NO BRASIL</text>
  <text x="60" y="440" font-family="'DM Mono', monospace" font-size="9" fill="#F2F0EB" opacity="0.4" letter-spacing="3">89% DOS PEDIDOS VIA INSTAGRAM</text>
  <text x="60" y="460" font-family="'DM Mono', monospace" font-size="9" fill="#DCB464" opacity="0.65" letter-spacing="3">3H46 POR DIA · MÉDIA BR</text>

  <!-- Bottom author -->
  <circle cx="72" cy="598" r="14" fill="#DCB464" opacity="0.2"/>
  <text x="96" y="602" font-family="'DM Mono', monospace" font-size="11" fill="#F2F0EB" opacity="0.6" letter-spacing="1">Ana Santos · Estrategista de Marca</text>

  <!-- Bottom line -->
  <rect x="0" y="629" width="1200" height="1" fill="#DCB464" opacity="0.4"/>
</svg>
