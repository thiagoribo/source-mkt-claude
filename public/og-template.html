<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: white;
    }
    .card {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      padding: 0 80px;
      gap: 56px;
      position: relative;
      overflow: hidden;
    }
    /* Subtle accent gradient */
    .card::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -80px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(220, 80, 60, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -100px;
      left: 60px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(180, 60, 40, 0.10) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo-wrap {
      flex-shrink: 0;
      width: 180px;
      height: 180px;
      border-radius: 24px;
      overflow: hidden;
      background: #141414;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .divider {
      width: 1px;
      height: 200px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.15), transparent);
      flex-shrink: 0;
    }
    .text {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .brand {
      font-size: 58px;
      font-weight: 700;
      letter-spacing: -1.5px;
      color: #ffffff;
      line-height: 1;
    }
    .tagline {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 300;
      letter-spacing: 0.2px;
      margin-top: 4px;
    }
    .url {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 12px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="../src/assets/logo-sm.png" alt="SM Agency logo">
    </div>
    <div class="divider"></div>
    <div class="text">
      <span class="brand">SM Agency</span>
      <span class="tagline">Branding &amp; Consultoria Estratégica</span>
      <span class="url">sourcemkt.com.br</span>
    </div>
  </div>
</body>
</html>
